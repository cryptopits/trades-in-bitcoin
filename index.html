<title>TIB — Trades in Bitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --border:   #1e1e1e;
  --border2:  #2a2a2a;
  --text:     #e8e8e8;
  --muted:    #555;
  --muted2:   #333;
  --orange:   #f5820a;
  --orange2:  #c4650a;
  --green:    #00c87a;
  --red:      #e03030;
  --sp:       #4a9eff;
  --crude:    #e0a030;
  --btc:      #f5820a;
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'IBM Plex Sans', sans-serif; overflow:hidden; }

/* ── HEADER ── */
#header {
  position:fixed; top:0; left:0; right:0; height:44px;
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; z-index:100;
}
#logo {
  font-family:'IBM Plex Mono', monospace;
  font-size:13px; font-weight:600; letter-spacing:3px;
  color:var(--orange);
}
#logo span { color:var(--muted); font-weight:300; }
#header-right {
  display:flex; align-items:center; gap:20px;
  font-family:'IBM Plex Mono', monospace; font-size:10px;
  color:var(--muted); letter-spacing:1px;
}
#btc-live { color:var(--orange); font-weight:500; }
#btc-change { font-size:10px; }
#btc-change.pos { color:var(--green); }
#btc-change.neg { color:var(--red); }

/* ── TOOLBAR ── */
#toolbar {
  position:fixed; top:44px; left:0; right:0; height:38px;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:0; z-index:99;
}
.range-btn {
  font-family:'IBM Plex Mono', monospace; font-size:10px;
  font-weight:500; letter-spacing:1px;
  color:var(--muted); background:none; border:none;
  padding:6px 12px; cursor:pointer; transition:color 0.15s;
  border-right:1px solid var(--border);
}
.range-btn:hover { color:var(--text); }
.range-btn.active { color:var(--orange); }
.tb-sep { width:1px; background:var(--border2); margin:6px 16px; height:20px; }
.legend-item {
  display:flex; align-items:center; gap:6px;
  font-family:'IBM Plex Mono', monospace; font-size:10px;
  color:var(--muted); margin-left:4px; margin-right:8px;
  cursor:pointer; user-select:none; transition:color 0.15s;
}
.legend-item:hover { color:var(--text); }
.legend-item.hidden { opacity:0.35; }
.legend-dot { width:8px; height:2px; border-radius:1px; }
#news-toggle {
  margin-left:auto;
  font-family:'IBM Plex Mono', monospace; font-size:10px;
  color:var(--muted); background:none; border:1px solid var(--border2);
  padding:4px 10px; cursor:pointer; letter-spacing:1px;
  transition:all 0.15s;
}
#news-toggle:hover, #news-toggle.active { color:var(--text); border-color:var(--muted); }

/* ── CHART AREA ── */
#chart-wrap {
  position:fixed; top:82px; left:0; right:0; bottom:0;
  display:flex;
}
#y-axis-area {
  width:62px; flex-shrink:0;
  border-right:1px solid var(--border);
  position:relative;
}
#chart-scroll {
  flex:1; overflow-x:auto; overflow-y:hidden; position:relative;
  scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
}
#chart-scroll::-webkit-scrollbar { height:4px; }
#chart-scroll::-webkit-scrollbar-track { background:transparent; }
#chart-scroll::-webkit-scrollbar-thumb { background:var(--border2); }
#chart-inner { position:relative; height:100%; }
canvas#main-chart { display:block; }
canvas#overlay-canvas {
  position:absolute; top:0; left:0; pointer-events:none;
}

/* ── TOOLTIP ── */
#tooltip {
  position:fixed; z-index:200; pointer-events:none;
  background:rgba(10,10,10,0.97); border:1px solid var(--border2);
  padding:10px 14px; min-width:220px; max-width:300px;
  display:none;
}
#tt-date { font-family:'IBM Plex Mono', monospace; font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
.tt-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; gap:16px; }
.tt-label { font-family:'IBM Plex Mono', monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }
.tt-val { font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600; }
#tt-news { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:none; }
#tt-news-icon { font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:4px; }
#tt-news-text { font-size:11px; color:var(--text); line-height:1.5; }
#tt-news-src { font-family:'IBM Plex Mono', monospace; font-size:9px; color:var(--muted); margin-top:4px; }

/* ── CROSSHAIR ── */
#crosshair-h, #crosshair-v {
  position:absolute; pointer-events:none; z-index:50; display:none;
}
#crosshair-h { left:0; right:0; height:1px; background:var(--border2); }
#crosshair-v { top:0; bottom:0; width:1px; background:var(--border2); }

/* ── STATUS ── */
#status {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--muted);
  letter-spacing:2px; z-index:100; pointer-events:none;
}
</style>
</head>

function updateLivePrice() {
  if (!btcData.length) return;
  const last = btcData[btcData.length-1];
  const prev = btcData[btcData.length-2];
  const el = document.getElementById('btc-live');
  const ch = document.getElementById('btc-change');
  const lu = document.getElementById('last-updated');
  el.textContent = '$' + last.price.toLocaleString();
  const pct = ((last.price - prev.price)/prev.price*100).toFixed(2);
  ch.textContent = (pct>0?'+':'')+pct+'%';
  ch.className = pct>=0?'pos':'neg';
  lu.textContent = 'UPDATED ' + last.date;
}

// ═══════════════════════════════════════════════
// BUILD UNIFIED DATE AXIS
// ═══════════════════════════════════════════════
function buildDateAxis() {
  const spDates = new Set(SP500_DATA.map(d=>d[0]));
  const crudeDates = new Set(CRUDE_DATA.map(d=>d[0]));
  const btcDates = new Set(btcData.map(d=>d.date));
  const all = new Set([...spDates, ...crudeDates, ...btcDates]);
  allDates = [...all].sort();
}

function getFilteredDates() {
  if (!allDates.length) return [];
  const last = new Date(allDates[allDates.length-1]);
  let start;
  if (activeRange==='1Y') start = new Date(last); start && (start.setFullYear(start.getFullYear()-(activeRange==='1Y'?1:activeRange==='2Y'?2:5)));
  const s = new Date(last);
  s.setFullYear(s.getFullYear() - (activeRange==='5Y'?5:activeRange==='2Y'?2:1));
  return allDates.filter(d => new Date(d) >= s);
}

function lookupVal(data, date, keyField) {
  // find closest date
  let closest = null, minDiff = Infinity;
  for (const row of data) {
    const d = Array.isArray(row) ? row[0] : row.date;
    const v = Array.isArray(row) ? row[1] : row.price;
    const diff = Math.abs(new Date(d) - new Date(date));
    if (diff < minDiff) { minDiff = diff; closest = v; }
  }
  return closest;
}

// ═══════════════════════════════════════════════
// CHART RENDER
// ═══════════════════════════════════════════════
const POINT_SPACING = 8;

function render() {
  const dates = getFilteredDates();
  if (!dates.length) return;

  const wrap = document.getElementById('chart-wrap');
  const scrollEl = document.getElementById('chart-scroll');
  const H = wrap.clientHeight;
  chartHeight = H;
  chartWidth = Math.max(dates.length * POINT_SPACING, scrollEl.clientWidth - 62);

  // set canvas sizes
  const mc = document.getElementById('main-chart');
  const oc = document.getElementById('overlay-canvas');
  mc.width = chartWidth; mc.height = H;
  oc.width = chartWidth; oc.height = H;
  document.getElementById('chart-inner').style.width = chartWidth + 'px';
  document.getElementById('chart-inner').style.height = H + 'px';

  const yc = document.getElementById('y-axis-canvas');
  yc.width = 62; yc.height = H;

  // gather values
  const btcVals = dates.map(d => lookupVal(btcData, d, 'date'));
  const spVals  = dates.map(d => lookupVal(SP500_DATA, d, null));
  const crVals  = dates.map(d => lookupVal(CRUDE_DATA, d, null));

  // normalize to % of first value in range for multi-axis display
  const b0 = btcVals[0]||1, s0 = spVals[0]||1, c0 = crVals[0]||1;
  const btcN = btcVals.map(v=>v!=null?(v/b0)*100:null);
  const spN  = spVals.map(v=>v!=null?(v/s0)*100:null);
  const crN  = crVals.map(v=>v!=null?(v/c0)*100:null);

  const allNorm = [...btcN,...spN,...crN].filter(v=>v!=null);
  const minN = Math.min(...allNorm)*0.97;
  const maxN = Math.max(...allNorm)*1.03;

  function toX(i) { return PAD.left + i*POINT_SPACING; }
  function toY(v) {
    if (v==null) return null;
    return PAD.top + (1-(v-minN)/(maxN-minN))*(H-PAD.top-PAD.bottom);
  }

  const mctx = mc.getContext('2d');
  mctx.clearRect(0,0,chartWidth,H);

  // Background
  mctx.fillStyle = '#0a0a0a';
  mctx.fillRect(0,0,chartWidth,H);

  // Grid lines
  const gridCount = 6;
  mctx.strokeStyle = '#1a1a1a';
  mctx.lineWidth = 1;
  for (let i=0; i<=gridCount; i++) {
    const y = PAD.top + i*(H-PAD.top-PAD.bottom)/gridCount;
    mctx.beginPath(); mctx.moveTo(0,y); mctx.lineTo(chartWidth,y); mctx.stroke();
  }

  // Date labels on x axis
  mctx.font = '10px IBM Plex Mono';
  mctx.fillStyle = '#333';
  mctx.textAlign = 'center';
  const labelEvery = Math.ceil(dates.length / (chartWidth/80));
  let lastYear = '';
  dates.forEach((d,i) => {
    if (i%labelEvery===0) {
      const yr = d.slice(0,4), mo = d.slice(5,7);
      const label = yr!==lastYear ? d.slice(0,7) : mo;
      mctx.fillStyle = yr!==lastYear ? '#555' : '#2a2a2a';
      mctx.fillText(label, toX(i), H-PAD.bottom+16);
      // tick
      mctx.strokeStyle = '#222';
      mctx.beginPath(); mctx.moveTo(toX(i),H-PAD.bottom); mctx.lineTo(toX(i),H-PAD.bottom+6); mctx.stroke();
      lastYear = yr;
    }
  });

  // Draw series
  function drawLine(vals, color, lineWidth) {
    mctx.beginPath(); mctx.strokeStyle = color; mctx.lineWidth = lineWidth;
    mctx.shadowBlur = 0;
    let started = false;
    vals.forEach((v,i) => {
      const y = toY(v);
      if (y==null) return;
      if (!started) { mctx.moveTo(toX(i),y); started=true; }
      else mctx.lineTo(toX(i),y);
    });
    mctx.stroke();
  }

  if (seriesVisible.crude) drawLine(crN, 'rgba(224,160,48,0.7)', 1.5);
  if (seriesVisible.sp)    drawLine(spN, 'rgba(74,158,255,0.8)', 1.5);
  if (seriesVisible.btc)   drawLine(btcN,'rgba(245,130,10,1)', 2);

  // News event pins
  if (showNews) {
    const filteredDates = new Set(dates);
    NEWS_EVENTS.forEach(ev => {
      if (!filteredDates.has(ev.date)) {
        // find closest
        let closest = dates[0], minD = Infinity;
        dates.forEach(d => {
          const diff = Math.abs(new Date(d)-new Date(ev.date));
          if (diff < minD) { minD = diff; closest = d; }
        });
        if (minD > 1000*60*60*24*10) return; // skip if >10 days off
        ev._mappedDate = closest;
      } else {
        ev._mappedDate = ev.date;
      }
      const i = dates.indexOf(ev._mappedDate);
      if (i<0) return;
      const x = toX(i);
      // vertical dotted line
      mctx.strokeStyle = 'rgba(255,255,255,0.06)';
      mctx.lineWidth = 1;
      mctx.setLineDash([3,4]);
      mctx.beginPath(); mctx.moveTo(x,PAD.top); mctx.lineTo(x,H-PAD.bottom); mctx.stroke();
      mctx.setLineDash([]);
      // diamond pin
      mctx.fillStyle = '#ffffff';
      mctx.strokeStyle = '#0a0a0a';
      mctx.lineWidth = 1;
      mctx.beginPath();
      mctx.moveTo(x, PAD.top+4);
      mctx.lineTo(x+4, PAD.top+9);
      mctx.lineTo(x, PAD.top+14);
      mctx.lineTo(x-4, PAD.top+9);
      mctx.closePath();
      mctx.fill();
      mctx.stroke();
    });
  }

  // Y-axis
  drawYAxis(minN, maxN, H, b0, s0, c0, gridCount);

  // store for hover
  mc._dates = dates; mc._btcN = btcN; mc._spN = spN; mc._crN = crN;
  mc._btcVals = btcVals; mc._spVals = spVals; mc._crVals = crVals;
  mc._toX = toX; mc._toY = toY;
}

function drawYAxis(minN, maxN, H, b0, s0, c0, gridCount) {
  const yc = document.getElementById('y-axis-canvas');
  const yctx = yc.getContext('2d');
  yctx.clearRect(0,0,62,H);
  yctx.fillStyle = '#0a0a0a';
  yctx.fillRect(0,0,62,H);
  yctx.font = '9px IBM Plex Mono';
  yctx.fillStyle = '#444';
  yctx.textAlign = 'right';
  for (let i=0; i<=gridCount; i++) {
    const frac = 1 - i/gridCount;
    const val = minN + frac*(maxN-minN);
    const y = PAD.top + i*(H-PAD.top-PAD.bottom)/gridCount;
    yctx.fillText((val-100).toFixed(0)+'%', 56, y+4);
  }
  // baseline label
  yctx.fillStyle = '#333';
  yctx.font = '8px IBM Plex Mono';
  yctx.fillText('BASE', 56, H-PAD.bottom+14);
  // axis border
  yctx.strokeStyle = '#1e1e1e';
  yctx.lineWidth = 1;
  yctx.beginPath(); yctx.moveTo(61,0); yctx.lineTo(61,H); yctx.stroke();
}

// ═══════════════════════════════════════════════
// HOVER / TOOLTIP
// ═══════════════════════════════════════════════
function handleMouseMove(e) {
  const mc = document.getElementById('main-chart');
  if (!mc._dates) return;
  const scrollEl = document.getElementById('chart-scroll');
  const rect = scrollEl.getBoundingClientRect();
  const xInScroll = e.clientX - rect.left + scrollEl.scrollLeft;
  const idx = Math.round((xInScroll - PAD.left) / POINT_SPACING);
  if (idx<0 || idx>=mc._dates.length) { hideTooltip(); return; }

  hoverIdx = idx;
  const x = mc._toX(idx);
  const tt = document.getElementById('tooltip');
  const ch = document.getElementById('crosshair-v');
  ch.style.display = 'block';
  ch.style.left = (x - scrollEl.scrollLeft) + 'px';

  // values
  const date = mc._dates[idx];
  const btcV = mc._btcVals[idx];
  const spV  = mc._spVals[idx];
  const crV  = mc._crVals[idx];

  document.getElementById('tt-date').textContent = date;
  document.getElementById('tt-btc').textContent  = btcV  ? '$'+btcV.toLocaleString()  : '—';
  document.getElementById('tt-sp').textContent   = spV   ? spV.toLocaleString()        : '—';
  document.getElementById('tt-crude').textContent= crV   ? '$'+crV.toFixed(1)+'/bbl'   : '—';

  // news
  const newsEl = document.getElementById('tt-news');
  const nearby = NEWS_EVENTS.find(ev => ev._mappedDate === date);
  if (nearby && showNews) {
    newsEl.style.display = 'block';
    document.getElementById('tt-news-text').textContent = nearby.text;
    document.getElementById('tt-news-src').textContent  = '— ' + nearby.src.toUpperCase();
  } else {
    newsEl.style.display = 'none';
  }

  // position tooltip
  tt.style.display = 'block';
  let tx = e.clientX + 16, ty = e.clientY - 20;
  if (tx + 310 > window.innerWidth) tx = e.clientX - 320;
  if (ty + 200 > window.innerHeight) ty = window.innerHeight - 220;
  tt.style.left = tx+'px'; tt.style.top = ty+'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
  document.getElementById('crosshair-v').style.display = 'none';
  hoverIdx = -1;
}

document.getElementById('chart-scroll').addEventListener('mousemove', handleMouseMove);
document.getElementById('chart-scroll').addEventListener('mouseleave', hideTooltip);

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeRange = btn.dataset.range;
    render();
    // scroll to end
    setTimeout(() => {
      const s = document.getElementById('chart-scroll');
      s.scrollLeft = s.scrollWidth;
    }, 50);
  });
});

document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const s = item.dataset.series;
    seriesVisible[s] = !seriesVisible[s];
    item.classList.toggle('hidden', !seriesVisible[s]);
    render();
  });
});

document.getElementById('news-toggle').addEventListener('click', () => {
  showNews = !showNews;
  document.getElementById('news-toggle').classList.toggle('active', showNews);
  render();
});

window.addEventListener('resize', () => { render(); });

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
fetchBTC().then(() => {
  setTimeout(() => {
    const s = document.getElementById('chart-scroll');
    s.scrollLeft = s.scrollWidth;
  }, 100);
});
</script>
